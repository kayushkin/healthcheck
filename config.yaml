check_interval: 60s
alert_threshold: 3
listen_addr: ":8099"
log_file: "/tmp/healthcheck-alerts.log"
nats_url: "nats://localhost:4222"
llm_bridge_url: "http://localhost:8160"

resources:
  - name: disk-root
    type: disk
    path: "/"
    threshold: 90
    cc_agent: true

  - name: memory
    type: memory
    threshold: 90
    cc_agent: true

services:
  - name: nats
    type: systemd
    unit: nats
    auto_restart: true


  - name: kayushkin
    type: systemd
    unit: kayushkin
    auto_restart: true

  - name: dash-server
    type: systemd
    unit: dash-server
    auto_restart: true

  - name: claude-code-adapter
    type: systemd
    unit: claude-code-adapter
    auto_restart: true

  - name: inber-server
    type: systemd
    unit: inber-server
    auto_restart: true

  - name: inber-party
    type: systemd
    unit: inber-party
    auto_restart: true

  - name: logstack
    type: systemd
    unit: logstack
    auto_restart: true

  - name: model-store
    type: systemd
    unit: model-store
    auto_restart: true

  - name: agent-store
    type: systemd
    unit: agent-store
    auto_restart: true

  - name: skill-store
    type: systemd
    unit: skill-store
    auto_restart: true

  - name: openclaw-adapter
    type: systemd
    unit: openclaw-adapter
    auto_restart: true

  - name: multichat-server
    type: systemd
    unit: multichat-server
    auto_restart: true

  - name: scheduler
    type: systemd
    unit: scheduler
    auto_restart: true

  - name: si
    type: systemd
    unit: si
    auto_restart: true

  - name: llmux
    type: systemd
    unit: llmux
    auto_restart: true

  - name: llm-bridge-adapter
    type: systemd
    unit: llm-bridge-adapter
    auto_restart: true

  - name: log-store
    type: systemd
    unit: log-store
    auto_restart: true

  # Core agent / tools (user units)
  - name: noteboard
    type: systemd
    unit: noteboard
    auto_restart: true

  - name: forge-api
    type: systemd
    unit: forge-api
    auto_restart: true

  - name: apiauth
    type: systemd
    unit: apiauth
    auto_restart: true

  - name: mailstack
    type: systemd
    unit: mailstack
    auto_restart: true

  - name: openclaw-gateway
    type: systemd
    unit: openclaw-gateway
    auto_restart: false

  - name: usage-store
    type: systemd
    unit: usage-store
    auto_restart: true

  - name: bus
    type: systemd
    unit: bus
    auto_restart: true

  - name: tunnel-server
    type: systemd
    unit: tunnel-server
    auto_restart: true

  # Services without systemd units — checked by HTTP health endpoint
  - name: marginalia
    type: http
    url: http://localhost:8192/health

  # Codex agent: ephemeral `codex app-server` process spawned by
  # llm-bridge-codex. Probe the auth token + process freshness; recover by
  # refreshing tokens and killing any stale long-lived app-server.
  - name: codex
    type: command
    command: ["/home/kayushkincom/bin/codex-healthcheck"]
    recovery_command: ["/home/kayushkincom/bin/codex-restart"]
    recovery_timeout: 90s

  # System (non-user) units
  - name: llm-bridge
    type: systemd
    unit: llm-bridge
    system_unit: true
    auto_restart: true

  - name: bookstack
    type: systemd
    unit: bookstack
    system_unit: true
    auto_restart: true

  - name: downloadstack
    type: systemd
    unit: downloadstack
    system_unit: true
    auto_restart: true

  - name: videostack
    type: systemd
    unit: videostack
    system_unit: true
    auto_restart: true

  - name: argraphments
    type: systemd
    unit: argraphments
    system_unit: true
    auto_restart: true

  - name: mangastack
    type: systemd
    unit: mangastack
    system_unit: true
    auto_restart: true

  - name: podcaststack
    type: systemd
    unit: podcaststack
    system_unit: true
    auto_restart: true
