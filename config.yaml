check_interval: 60s
alert_threshold: 3
listen_addr: ":8099"
log_file: "/tmp/healthcheck-alerts.log"
nats_url: "nats://localhost:4222"
llm_bridge_url: "http://localhost:8160"

resources:
  - name: disk-root
    type: disk
    path: "/"
    threshold: 90
    cc_agent: true

  - name: memory
    type: memory
    threshold: 90
    cc_agent: true

services:
  - name: nats
    type: systemd
    unit: nats
    auto_restart: true


  # kayushkin.com is a SYSTEM unit (/etc/systemd/system/kayushkin.service) — it is
  # the process that actually binds :8080 and serves the site.
  #
  # Without system_unit, this check ran `systemctl --user is-active kayushkin` and
  # so watched a SECOND, shadow unit of the same name in ~/.config/systemd/user/.
  # That shadow can never start while the real one holds :8080, so it died on
  # `bind: address already in use` and auto_restart dutifully restarted it — for
  # 811,295 restarts. The check was therefore both permanently red and actively
  # harmful, and its green state would have meant the real site was DOWN.
  - name: kayushkin
    type: systemd
    unit: kayushkin
    system_unit: true
    auto_restart: true

  - name: dash-server
    type: systemd
    unit: dash-server
    auto_restart: true

  - name: inber-party
    type: systemd
    unit: inber-party
    auto_restart: true

  - name: inber-server
    type: systemd
    unit: inber-server
    auto_restart: true

  - name: logstack
    type: systemd
    unit: logstack
    auto_restart: true

  - name: model-store
    type: systemd
    unit: model-store
    auto_restart: true

  - name: agent-store
    type: systemd
    unit: agent-store
    auto_restart: true

  - name: skill-store
    type: systemd
    unit: skill-store
    auto_restart: true

  - name: tool-store
    type: systemd
    unit: tool-store
    auto_restart: true

  - name: repo-store
    type: systemd
    unit: repo-store
    auto_restart: true

  - name: bundle-store
    type: systemd
    unit: bundle-store
    auto_restart: true

  - name: permission-store
    type: systemd
    unit: permission-store
    auto_restart: true

  - name: kanban-store
    type: systemd
    unit: kanban-store
    auto_restart: true

  - name: multichat-server
    type: systemd
    unit: multichat-server
    auto_restart: true

  - name: scheduler
    type: systemd
    unit: scheduler
    auto_restart: true

  - name: si
    type: systemd
    unit: si
    auto_restart: true

  - name: llmux
    type: systemd
    unit: llmux
    auto_restart: true

  - name: llm-bridge-adapter
    type: systemd
    unit: llm-bridge-adapter
    auto_restart: true

  - name: log-store
    type: systemd
    unit: log-store
    auto_restart: true

  # Core agent / tools (user units)
  - name: noteboard
    type: systemd
    unit: noteboard
    auto_restart: true

  - name: forge-api
    type: systemd
    unit: forge-api
    auto_restart: true

  - name: auth-store
    type: systemd
    unit: auth-store
    auto_restart: true

  - name: mailstack
    type: systemd
    unit: mailstack
    auto_restart: true

  - name: usage-store
    type: systemd
    unit: usage-store
    auto_restart: true

  # Services without systemd units — checked by HTTP health endpoint
  - name: marginalia
    type: http
    url: http://localhost:8192/health

  # Codex agent: ephemeral `codex app-server` process spawned by
  # llm-bridge-codex. Probe the auth token + process freshness; recover by
  # refreshing tokens and killing any stale long-lived app-server.
  - name: codex
    type: command
    command: ["/home/kayushkincom/bin/codex-healthcheck"]
    recovery_command: ["/home/kayushkincom/bin/codex-restart"]
    recovery_timeout: 90s

  # Clean-checkout build guard. Answers one question: does every repo still
  # compile from its COMMITTED HEAD, as opposed to from somebody's working tree?
  # Seven did not, and nobody knew for as long as 3.5 months, because a working
  # tree builds for reasons a fresh clone does not inherit.
  #
  # The expensive sweep runs nightly under the scheduler and leaves its verdict
  # in report.json; this check only reads that verdict, so it is cheap enough to
  # poll on the 60s interval. No auto_restart — there is nothing to restart, the
  # failure is in a git tree and a human has to fix it.
  #
  # Reports STALE as loudly as BROKEN: a guard that quietly stopped running looks
  # exactly like a guard that is passing, and that equivalence is the whole bug.
  - name: repo-build-guard
    type: command
    command: ["/home/kayushkincom/repos/healthcheck/scripts/repo-build-audit-status.sh"]
    expect_output: "ok"

  # System (non-user) units
  - name: llm-bridge
    type: systemd
    unit: llm-bridge
    system_unit: true
    auto_restart: true

  - name: bookstack
    type: systemd
    unit: bookstack
    system_unit: true
    auto_restart: true

  - name: downloadstack
    type: systemd
    unit: downloadstack
    system_unit: true
    auto_restart: true

  - name: videostack
    type: systemd
    unit: videostack
    system_unit: true
    auto_restart: true

  - name: argraphments
    type: systemd
    unit: argraphments
    system_unit: true
    auto_restart: true
