check_interval: 60s
alert_threshold: 3
listen_addr: ":8099"
log_file: "/tmp/healthcheck-alerts.log"
nats_url: "nats://localhost:4222"
claude_path: "/home/kayushkincom/.local/bin/claude"
claude_workdir: "/home/kayushkincom"

resources:
  - name: disk-root
    type: disk
    path: "/"
    threshold: 90
    cc_agent: true

  - name: memory
    type: memory
    threshold: 90
    cc_agent: true

services:
  - name: nats
    type: systemd
    unit: nats
    auto_restart: true


  - name: kayushkin
    type: systemd
    unit: kayushkin
    auto_restart: true

  - name: dash-server
    type: systemd
    unit: dash-server
    auto_restart: true

  - name: claude-code-adapter
    type: systemd
    unit: claude-code-adapter
    auto_restart: true

  - name: inber-server
    type: systemd
    unit: inber-server
    auto_restart: true

  - name: inber-party
    type: systemd
    unit: inber-party
    auto_restart: true

  - name: logstack
    type: systemd
    unit: logstack
    auto_restart: true

  - name: model-store
    type: systemd
    unit: model-store
    auto_restart: true

  - name: agent-store
    type: systemd
    unit: agent-store
    auto_restart: true

  - name: openclaw-adapter
    type: systemd
    unit: openclaw-adapter
    auto_restart: true

  - name: multichat-server
    type: systemd
    unit: multichat-server
    auto_restart: true

  - name: scheduler
    type: systemd
    unit: scheduler
    auto_restart: true

  - name: si
    type: systemd
    unit: si
    auto_restart: true

  - name: llmux
    type: systemd
    unit: llmux
    auto_restart: true

  - name: log-store
    type: systemd
    unit: log-store
    auto_restart: true
