check_interval: 60s
alert_threshold: 3
listen_addr: ":8099"
log_file: "/tmp/healthcheck-alerts.log"
nats_url: "nats://localhost:4222"
llm_bridge_url: "http://localhost:8160"

resources:
  - name: disk-root
    type: disk
    path: "/"
    threshold: 90
    cc_agent: true

  - name: memory
    type: memory
    threshold: 90
    cc_agent: true

services:
  - name: nats
    type: systemd
    unit: nats
    auto_restart: true


  # kayushkin.com is a SYSTEM unit (/etc/systemd/system/kayushkin.service) — it is
  # the process that actually binds :8080 and serves the site.
  #
  # Without system_unit, this check ran `systemctl --user is-active kayushkin` and
  # so watched a SECOND, shadow unit of the same name in ~/.config/systemd/user/.
  # That shadow can never start while the real one holds :8080, so it died on
  # `bind: address already in use` and auto_restart dutifully restarted it — for
  # 811,295 restarts. The check was therefore both permanently red and actively
  # harmful, and its green state would have meant the real site was DOWN.
  - name: kayushkin
    type: systemd
    unit: kayushkin
    system_unit: true
    auto_restart: true

  - name: dash-server
    type: systemd
    unit: dash-server
    auto_restart: true

  - name: inber-party
    type: systemd
    unit: inber-party
    auto_restart: true

  - name: inber-server
    type: systemd
    unit: inber-server
    auto_restart: true

  - name: logstack
    type: systemd
    unit: logstack
    auto_restart: true

  - name: model-store
    type: systemd
    unit: model-store
    auto_restart: true

  - name: agent-store
    type: systemd
    unit: agent-store
    auto_restart: true

  - name: skill-store
    type: systemd
    unit: skill-store
    auto_restart: true

  - name: tool-store
    type: systemd
    unit: tool-store
    auto_restart: true

  - name: repo-store
    type: systemd
    unit: repo-store
    auto_restart: true

  - name: bundle-store
    type: systemd
    unit: bundle-store
    auto_restart: true

  - name: permission-store
    type: systemd
    unit: permission-store
    auto_restart: true

  - name: kanban-store
    type: systemd
    unit: kanban-store
    auto_restart: true

  - name: multichat-server
    type: systemd
    unit: multichat-server
    auto_restart: true

  - name: scheduler
    type: systemd
    unit: scheduler
    auto_restart: true

  - name: si
    type: systemd
    unit: si
    auto_restart: true

  - name: llmux
    type: systemd
    unit: llmux
    auto_restart: true

  - name: llm-bridge-adapter
    type: systemd
    unit: llm-bridge-adapter
    auto_restart: true

  - name: log-store
    type: systemd
    unit: log-store
    auto_restart: true

  # Core agent / tools (user units)
  - name: noteboard
    type: systemd
    unit: noteboard
    auto_restart: true

  - name: forge-api
    type: systemd
    unit: forge-api
    auto_restart: true

  - name: auth-store
    type: systemd
    unit: auth-store
    auto_restart: true

  - name: mailstack
    type: systemd
    unit: mailstack
    auto_restart: true

  - name: usage-store
    type: systemd
    unit: usage-store
    auto_restart: true

  # Services without systemd units — checked by HTTP health endpoint
  - name: marginalia
    type: http
    url: http://localhost:8192/health

  # Codex agent: ephemeral `codex app-server` process spawned by
  # llm-bridge-codex. Probe the auth token + process freshness; recover by
  # refreshing tokens and killing any stale long-lived app-server.
  - name: codex
    type: command
    command: ["/home/kayushkincom/bin/codex-healthcheck"]
    recovery_command: ["/home/kayushkincom/bin/codex-restart"]
    recovery_timeout: 90s

  # Clean-checkout build guard. Answers one question: does every repo still
  # compile from its COMMITTED HEAD, as opposed to from somebody's working tree?
  # Seven did not, and nobody knew for as long as 3.5 months, because a working
  # tree builds for reasons a fresh clone does not inherit.
  #
  # The expensive sweep runs nightly under the scheduler and leaves its verdict
  # in report.json; this check only reads that verdict, so it is cheap enough to
  # poll on the 60s interval. No auto_restart — there is nothing to restart, the
  # failure is in a git tree and a human has to fix it.
  #
  # Reports STALE as loudly as BROKEN: a guard that quietly stopped running looks
  # exactly like a guard that is passing, and that equivalence is the whole bug.
  - name: repo-build-guard
    type: command
    command: ["/home/kayushkincom/repos/healthcheck/scripts/repo-build-audit-status.sh"]
    expect_output: "ok"

  # Boot-and-answer guard (tier 2). Compiling is necessary and not sufficient:
  # Go 1.22+ ServeMux panics on a conflicting route pattern at REGISTRATION time,
  # so a route collision is invisible to the compiler and fatal at boot — which
  # is exactly what agent-store 3876e8e did to llm-bridge-server, across a repo
  # boundary. noteboard is the standing proof that green != alive: its tree
  # compiles clean and a bare `go build` yields a binary that dies on its first
  # request with `no such module: fts5`.
  #
  # So the nightly sweep also runs each repo's committed scripts/e2e-smoke.sh
  # from the clean clone and asserts the binary boots and answers a real route.
  # Same shape as repo-build-guard: the expensive part runs under the scheduler,
  # this check only reads the verdict, and STALE fails as loudly as BROKEN.
  - name: repo-smoke-guard
    type: command
    command: ["/home/kayushkincom/repos/healthcheck/scripts/repo-smoke-status.sh"]
    expect_output: "ok"

  # The other half of tier 1. repo-build-guard walks go.mod and stops there, so
  # every TypeScript tree in the fleet was unguarded — and they are a MORE likely
  # home for this bug class than the Go repos, not less, because `file:../sibling`
  # links a package through its BUILD ARTIFACT rather than compiling it from
  # source. If that artifact is gitignored and nothing rebuilds it, the consumer
  # builds only where a stale copy happens to be lying around.
  #
  # That is not hypothetical: kayushkin.com could not be built from its committed
  # source, because miditab (linked file:) shipped no way to produce its own entry
  # point. deploy.sh commits the bundle and the server serves it, so the live
  # site's frontend was reproducible on exactly one machine on earth.
  #
  # Also asserts something the Go pass has no equivalent for: bridge-ui, dash,
  # llmux and kayushkin.com all COMMIT their build output and serve it directly,
  # so a bundle that no longer matches its source is stale JavaScript shipped to
  # real users from a tree whose git status is clean. After building the committed
  # source in a pristine clone, the clone must still be pristine.
  - name: repo-node-guard
    type: command
    command: ["/home/kayushkincom/repos/healthcheck/scripts/repo-node-status.sh"]
    expect_output: "ok"

  # Tier 3: does the RUNNING binary match the COMMITTED source?
  #
  # The three guards above all interrogate the committed tree — does it compile,
  # does it boot, does its bundle match its source. Not one of them ever looks at
  # the process actually serving traffic, and that blind spot is total: a stale
  # service is up, answers, and passes every health check. It just isn't running
  # your code.
  #
  # Found the hard way on 2026-07-13. llm-bridge-server was serving a Jun-15
  # binary, 14 commits behind HEAD — including the fix for the bug being
  # investigated at the time. The cause chains through the other guards: a
  # .gitignore glob (credentials.*) swallowed internal/harness/credentials.go, so
  # the COMMITTED tree stopped compiling, so HEAD could not be deployed, so a
  # month of commits piled up. repo-build-guard eventually caught the unbuildable
  # tree — but once that was fixed, nothing noticed the running process was still
  # a month stale. Compiling and booting were guarded. Shipping never was.
  #
  # Identifies each artifact by the module path and git revision Go stamps into
  # it (go version -m), never by filename. Filenames lie on this host in both
  # directions: llm-bridge-server/ deploys a binary named `llm-bridge`, while
  # ~/bin/llm-bridge-server is a dead Apr-13 leftover nothing runs. A
  # filename-based audit reads the leftover and reports 176 commits behind,
  # sending you after a binary that has not served a request in three months.
  #
  # Also flags the other direction of the same drift: uncommitted tracked changes
  # in a repo that no ACTIVE bridge session is working in — work abandoned
  # mid-flight, which the next agent will silently conflict with.
  - name: repo-deploy-guard
    type: command
    command: ["/home/kayushkincom/repos/healthcheck/scripts/repo-deploy-status.sh"]
    expect_output: "ok"

  # Tier 1, a fourth axis: has a repo committed a compiled binary into its own
  # source tree? A committed multi-MB ELF is pure weight in every clone and reads
  # as source to anyone (human or agent) grepping the tree, while the live service
  # runs its own ~/bin artifact — so the committed blob is a stale dropping that
  # nobody notices until it is a habit. On 2026-07-16 a hand sweep of ~/repos
  # found nine repos had each accumulated one, and the sweep itself had to be done
  # by a human walking the tree because nothing watched for it.
  #
  # Same shape as the guards above: the fleet-wide HEAD scan runs nightly under
  # the scheduler (repo-elf-guard job) and leaves its verdict in elf-report.json;
  # this check only reads that verdict. There is deliberately NO allowlist — a repo
  # that genuinely must commit a binary is a decision to make out loud when it
  # happens, not a line pre-blessed here. STALE fails as loudly as a finding: a
  # guard that quietly stopped running looks exactly like one that is passing.
  - name: repo-elf-guard
    type: command
    command: ["/home/kayushkincom/repos/healthcheck/scripts/repo-elf-status.sh"]
    expect_output: "ok"

  # System (non-user) units
  - name: llm-bridge
    type: systemd
    unit: llm-bridge
    system_unit: true
    auto_restart: true

  - name: bookstack
    type: systemd
    unit: bookstack
    system_unit: true
    auto_restart: true

  - name: downloadstack
    type: systemd
    unit: downloadstack
    system_unit: true
    auto_restart: true

  - name: videostack
    type: systemd
    unit: videostack
    system_unit: true
    auto_restart: true

  - name: argraphments
    type: systemd
    unit: argraphments
    system_unit: true
    auto_restart: true
